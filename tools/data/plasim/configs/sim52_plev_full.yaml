#
# PLASIM sim52 conversion config — PRESSURE-LEVEL-ONLY archive of the
# upper-air variables, sibling to sim52_full_coverage.yaml.
#
# Source data:
#   /work/hdd/bdiu/awikner/PLASIM/data/2100_year_sims_rerun/sim52/h5/plev_data
#
# The plev_data H5 files carry all 5 upper-air variables (ta, ua, va, hus,
# zg) on the full 13-level pressure axis — no sigma data is present. So
# this config sets ``use_sigma_levels: False`` and the converter's
# ``_split_upper_air_vars`` routes every upper-air variable onto the
# pressure axis (with no sigma_level coord written to the Zarr).
#
# Output layout (per-year Zarr stores) mirrors sim52_full_coverage.yaml
# but with no ``sigma_level`` coord and no sigma cubes in upper-air vars.

PLASIM:
  upper_air_variables: ['ta', 'ua', 'va', 'hus', 'zg']
  surface_variables: ['pl', 'tas']
  diagnostic_variables: ["pr_6h"]
  land_variables: []
  ocean_variables: []
  constant_boundary_variables: ['lsm', 'z0', 'sg']
  varying_boundary_variables: ['sst', 'rsdt', 'sic']
  data_timedelta_hours: 6
  calendar: 'proleptic_gregorian'
  has_year_zero: True
  num_levels: 13
  use_sigma_levels: False
  # Full 13-level pressure axis (Pa) — same set the plev_data H5 files use.
  levels:
    - 5000
    - 10000
    - 15000
    - 20000
    - 25000
    - 30000
    - 40000
    - 50000
    - 60000
    - 70000
    - 85000
    - 92500
    - 100000
  horizontal_resolution: [64, 128]
