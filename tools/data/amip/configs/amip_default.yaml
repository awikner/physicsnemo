  # ------------------------------------------------------------------- #
  # Channel-group role lists (consumed by ClimateZarrDataset at runtime).
  # ------------------------------------------------------------------- #

  # 5 prognostic upper-air variables on the 26 pressure levels.
  # `vertical_velocity` is intentionally absent — it lives under
  # `extra_variables` below so the Zarr keeps the data but the role list
  # doesn't route it through the model by default.
  pressure_upper_air_variables:
    - temperature
    - u_component_of_wind
    - v_component_of_wind
    - geopotential
    - specific_total_water

  # Prognostic 2D state — surface meteorology + the 8 soil layers
  # (Phase 8b decision Q2/Q3: flattened into surface).
  surface_variables:
    - 2m_temperature
    - 2m_specific_humidity
    - 2m_dewpoint_temperature
    - 10m_u_component_of_wind
    - 10m_v_component_of_wind
    - skin_temperature
    - snow_depth
    - surface_pressure
    - soil_temperature_level_1
    - soil_temperature_level_2
    - soil_temperature_level_3
    - soil_temperature_level_4
    - volumetric_soil_water_layer_1
    - volumetric_soil_water_layer_2
    - volumetric_soil_water_layer_3
    - volumetric_soil_water_layer_4

  # Input-only constant 2D boundaries — read once + cached.
  constant_boundary_variables:
    - land_sea_mask
    - geopotential_at_surface

  # Input-only time-varying 2D forcings (incl. CO₂ broadcast to 2D per Q4).
  varying_boundary_variables:
    - sea_surface_temperature
    - sea_ice_cover
    - DSWRFtoa
    - DSWRFtoa_24h_lead
    - global_mean_co2

  # Output-only 2D fields — predicted by the model but not autoregressed.
  diagnostic_variables:
    - DLWRFsfc_24h
    - DSWRFsfc_24h
    - ULWRFsfc_24h
    - ULWRFtoa_24h
    - USWRFsfc_24h
    - USWRFtoa_24h
    - LHTFLsfc_24h
    - SHTFLsfc_24h
    - PRATEsfc_24h
    - hcc_24h
    - lcc_24h
    - mcc_24h
    - mn2t_24h
    - mx2t_24h
    - mxtpr_24h

  # `extra_variables` — written to the Zarr but NOT added to any role-list
  # attr. The dataset reader skips them by default; downstream code can
  # opt-in by adding them to a model YAML's variable lists.
  extra_variables:
    pressure_upper_air_variables:
      - vertical_velocity
    surface_variables: []
