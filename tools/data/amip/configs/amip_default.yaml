#
# AMIP channel-config for tools/data/amip/amip_h5_to_zarr.py.
#
# Source: /work/hdd/bdiu/awikner/AMIP/h5/{year}_{idx:04d}.h5
#   - 1978–2024, 1460/1464 files per year (6h cadence)
#   - 180×360 grid (1°)
#   - 26 pressure levels (hPa)
#   - 4 soil layers (flattened into surface_variables per Phase 8b decision)
#
# Channel routing decisions locked in for Phase 8b:
#   Q1 — variable roles match the user's confirmed routing.
#   Q2 — soil variables flattened into surface_variables (4 levels × 2 vars = 8).
#   Q3 — all 8 soil vars treated as prognostic surface state.
#   Q4 — global_mean_co2 routed as a varying_boundary_variable.
#   Q5 — calendar: standard (Gregorian) for the 1978–2024 span.
#   Q9 — vertical_velocity goes into the Zarr via `extra_variables`
#        but is NOT in pressure_upper_air_variables so the default
#        dataset reader skips it.

AMIP:
  # Source dir + grid geometry (overridable on the CLI).
  data_dir: /work/hdd/bdiu/awikner/AMIP/h5
  horizontal_resolution: [180, 360]
  data_timedelta_hours: 6
  calendar: standard

  # Lat/lon — pixel-centered 1° grid (90 → -90 step -1, offset by 0.5).
  # Latitudes descend north → south (ERA5 convention). If your AMIP archive
  # uses corner-centered or step-1 nodes, override the lat/lon arrays here.
