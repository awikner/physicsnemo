#
# Short-horizon rollout validation — 1, 5, 10 dataset steps from each IC.
# Cheap; sane default for quick sanity-checking during training.

every_n_epochs: 1
rollout:
  enabled: True
  log_steps: [1, 5, 10]
  max_initial_conditions: 4
  ic_stride: 30
  batch_size: 1
  ensemble_size: 1
  perturber: deterministic
  perturber_scales: {}
