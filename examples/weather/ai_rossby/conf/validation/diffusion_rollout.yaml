#
# Mid-training rollout validation for the AMIP diffusion recipes
# (SI / SI_X / ERDM / RFM). Cadence default is every 5 epochs (Phase 8c
# follow-up Q9 = b) — full diffusion sampling at every-epoch granularity
# is expensive, and the lower cadence still gives enough resolution to
# track convergence.
#
# Key knobs:
#
# * ``rollout.log_steps`` — lead times to score (single-step schedulers
#   march autoregressively to ``max(log_steps)``; rolling schedulers
#   default ``horizon = scheduler.window_size`` and ``log_steps`` must
#   all fit inside it).
# * ``rollout.sampler.num_steps`` — solver steps per emitted frame at
#   *validation*. Decoupled from the training scheduler's ``num_steps``
#   (Phase 8c follow-up Q4 = b) so long-horizon validation can use a
#   fast sampler. Accepts either a single int (applied uniformly) or a
#   list of ints of length ``horizon`` — one entry per emitted frame
#   (Phase 8f, F4). E.g. ``[20, 20, 10, 10, 4, 4]`` spends more solver
#   steps on the first few (harder) frames and tapers off for later
#   ones, capping total sampling cost on long rollouts (needed by the
#   Phase 8f eval suite's multi-year climatology/QBO runs).
# * ``rollout.ensemble_size`` — diffusion ensemble per IC. Default 1
#   (Phase 8c follow-up Q5). Spread metrics are emitted only when this
#   exceeds 1.
# * ``rollout.metrics`` — toggles per metric family. All enabled by
#   default (Phase 8c follow-up Q7).

every_n_epochs: 5

rollout:
  enabled: True
  # Lead times (in dataset steps) at which to score predictions.
  log_steps: [1, 3, 6]
  # Total ICs evaluated per epoch across all DDP ranks (Phase 8c Q3 = 4).
  max_initial_conditions: 4
  ic_stride: 30
  batch_size: 1
  # Ensemble axis (Phase 8c Q5 = 1, configurable).
  ensemble_size: 1
  # ``deterministic`` | ``replicate_only`` | ``gaussian_ic``.
  perturber: deterministic
  perturber_scales: {}
  # Horizon defaults to ``scheduler.window_size`` for rolling
  # schedulers and to ``max(log_steps)`` for single-step. Override here
  # to extend the rollout past the training window (RFM / ERDM only).
  horizon: null
  # Validation-time diffusion sampler — independent of training.
  sampler:
    # ``null`` falls back to the inference scheduler's own ``num_steps``.
    # A single int applies uniformly to every emitted frame; a fast
    # (e.g. 4-step) override is useful for long rollouts. A list of
    # length ``horizon`` gives a per-emitted-frame schedule instead,
    # e.g.:
    #   num_steps: [20, 20, 10, 10, 4, 4]
    num_steps: null
  metrics:
    rmse: True
    acc: True
    spread: True
