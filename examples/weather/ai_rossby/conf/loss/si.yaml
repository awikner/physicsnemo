#
# SI (Stochastic Interpolant — DriftScheduler) training loss.
#
# Used by examples/weather/ai_rossby/train_diffusion.py via
# ``hydra.utils.instantiate(cfg.loss)``: the recipe passes the scheduler
# instance through to the inner loop as ``scheduler.compute_loss(wrapper,
# x, c_grid, c_scalar, y)``.

_target_: physicsnemo.experimental.diffusion.DriftScheduler
num_steps: 10
sigma_coef: 1.0
beta_fn: t
noise: gaussian
l_max: 45
noise_scale_path: null
integrator: euler
