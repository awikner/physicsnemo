# RFM (Rolling Flow Matching) training loss.

_target_: physicsnemo.experimental.diffusion.RFMScheduler
window_size: 6
num_steps: 4
solver: euler
weighting: midrange
time_eps: 1.0e-3
init_mode: oracle
P_mean: 0.0
P_std: 1.0
noise: gaussian
l_max: 90
