# PanguPlasim (VAE) single-stage training config — LinearWarmupCosineAnnealingLR.

amp: none
grad_clip_norm: 0.0
max_epochs: 100

optimizer:
  type: AdamW
  lr: 1.0e-4
  weight_decay: 3.0e-6
  fused: null

ema:
  enabled: True
  decay: 0.999
  warmup_epochs: 6

stages:
  - name: default
    num_epochs: ${training.max_epochs}
    unroll_steps: 1
    max_iterations: .inf
    batch_size: null
    scheduler:
      type: LinearWarmupCosineAnnealingLR
      num_warmup_epochs: 5
      warmup_start_lr: 1.0e-8
      eta_min: 0.0
