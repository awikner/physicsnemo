#
# ERA5 1981 single-year dataset with SFNO_S2S_0003_test channel coverage
# (17 pressure levels, 9 surface vars, 2 diag, 2 const, 1 varying).
# Pairs with conf/model/sfno_plasim_s2s.yaml.

zarr_path: /work/hdd/bdiu/awikner/physicsnemo-zarr/era5_sfno_s2s/1981.zarr
val_zarr_path: null
mean_path: /work/hdd/bdiu/awikner/physicsnemo-zarr/era5/normalization_pangu_s2s_mean.zarr
std_path: /work/hdd/bdiu/awikner/physicsnemo-zarr/era5/normalization_pangu_s2s_std.zarr
delta_std_path: null
boundary_zarr_path: null
yearly_repeating_boundary: False
leap_boundary_zarr_path: null
non_leap_boundary_zarr_path: null

forecast_lead_times: [1]
num_samples_per_epoch: null
batch_size: 4
num_workers: 4
prefetch_factor: 2
persistent_workers: True
pin_memory: True
nan_fill_default: 0.0
nan_fill_values: {}
shuffle: True

# ERA5 stats files in our setup don't carry land_sea_mask / geopotential_at_surface
# / total_precipitation_24hr stats, so leave these off unless extending the stats.
normalize_constant_boundary: False
normalize_diagnostic: False
