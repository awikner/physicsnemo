#
# Top-level config for the ai_rossby training recipe.
#
# Compositional structure (Hydra groups):
#   model      — model architecture + variable-group routing
#   loss       — loss-function family (raw/lat-weighted L1/L2, +/- VAE-KL)
#   dataset    — Zarr store paths, normalization stats, batch/loader knobs
#   training   — optimizer + EMA + multi-stage curriculum (each stage names
#                its own scheduler + unroll_steps + num_epochs)
#   validation — rollout validator + ensemble settings
#
# Defaults pick the PanguPlasimLegacy + OneCycle + raw L1 + single-step
# combination that matches PanguWeather v2.0 PANGU_PLASIM_H5_DERECHO_0514.yaml.
# Override on the command line, e.g.
#   python train.py model=sfno_plasim_5412 training=sfno_plasim \
#                   dataset=plasim_sim52_year12 validation=rollout_5412

defaults:
  - _self_
  - model: pangu_plasim_legacy
  - loss: mae
  - dataset: plasim_sim52_year12
  - training: pangu_plasim_legacy
  - validation: off

hydra:
  job:
    chdir: True
  run:
    dir: ./outputs/${run_name}

run_name: pangu_plasim_legacy

# --- Run control -----------------------------------------------------------
start_epoch: 1
seed: 0
checkpoint_save_interval: 10
max_checkpoints_to_keep: 5
log_every_n_steps: 1

# --- Wandb (optional) ------------------------------------------------------
# When enabled=True (rank 0 only) initialize_wandb runs and LaunchLogger
# routes all log_minibatch / log_epoch dicts through it under 'train/' and
# 'valid/' namespaces.
wandb:
  enabled: False
  project: ai-rossby
  entity: null
  name: ${run_name}
  mode: offline                   # offline | online | disabled

# --- Bench-time per-batch TSV emission (optional) --------------------------
# When non-null and rank 0, every training-step's loss components are
# appended to a TSV at this path. Used by benchmarks/.../sfno_plasim/.
bench:
  per_batch_tsv: null
