#
# Linear warmup + cosine annealing — reserved for the PanguPlasim (VAE)
# variant, kept here so the same scheduler factory can serve both.

optimizer_type: AdamW
lr: 1.0e-4
weight_decay: 3.0e-6

scheduler: LinearWarmupCosineAnnealingLR
num_warmup_steps: 0   # set by train.py = num_warmup_epochs * steps_per_epoch
num_warmup_epochs: 5
warmup_start_lr: 1.0e-8
eta_min: 0.0
