#
# SI_X (DynamicInterpolant) inference sampler. Single-step scheduler —
# pairs with single-step wrappers (AmipDiTWrapper) only. The training
# sampler choice (``train_sampler``) is irrelevant at inference; the
# inference path always uses the :py:meth:`sample` method.

_target_: physicsnemo.experimental.diffusion.DynamicInterpolant
num_steps: 10
sigma_coef: 1.0
train_sampler: uniform
integrator: euler
l_max: 90
noise: gaussian
noise_scale_path: null
tau: 1.3
t_final: 0.999
