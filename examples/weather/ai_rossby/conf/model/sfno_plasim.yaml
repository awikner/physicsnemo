#
# SfnoPlasim model config — vendored Modulus SFNO with the PLASIM variable
# routing wrapper. Mirrors PanguWeather v2.0 SFNO_PLASIM_H5_DERECHO_5412.yaml.
# Pair with `loss=raw_l2` + `scheduler=cosine_warmup`.

name: sfno_plasim
target: physicsnemo.experimental.models.sfno_plasim.SfnoPlasim
model_type: SfnoPlasim

# Variable groups — match the Pangu_Plasim configs so the same datapipe + sample
# dict layout works for both model families.
surface_variables: [pl, tas]
upper_air_variables: [ta, ua, va, hus, zg]
constant_boundary_variables: [lsm, sg, z0]
varying_boundary_variables: [sst, rsdt, sic]
diagnostic_variables: [pr_6h]

# Grid / level geometry — PLASIM T42 at 10 sigma levels (sim52 layout). SFNO
# treats sigma vs pressure uniformly so a single `levels` list works.
levels: [0.0383, 0.1191, 0.2109, 0.3168, 0.4368, 0.5668, 0.6993, 0.8233, 0.9241, 0.9833]
horizontal_resolution: [64, 128]

# SFNO-specific kwargs (PanguWeather SFNO_PLASIM defaults).
spectral_transform: sht
filter_type: linear
operator_type: dhconv
scale_factor: 1
embed_dim: 256
num_layers: 12
use_mlp: True
mlp_ratio: 2.0
activation_function: gelu
encoder_layers: 1
pos_embed: False
drop_rate: 0.0
drop_path_rate: 0.0
num_blocks: 8
sparsity_threshold: 0.0
normalization_layer: instance_norm
hard_thresholding_fraction: 1.0
use_complex_kernels: True
big_skip: True
rank: 1.0
factorization: null
separable: False
complex_network: True
complex_activation: real
spectral_layers: 3
checkpointing: 0
data_grid: equiangular
