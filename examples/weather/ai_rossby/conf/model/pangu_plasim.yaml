#
# PanguPlasim model config — VAE-enabled (training-only dual-encoder + KL term).
# Shares backbone defaults with the deterministic PanguPlasimLegacy config;
# the difference is `model_type` and pairing with `loss=mae_with_kl` (or
# `mse_with_kl`) + `scheduler=cosine_warmup`.

name: PanguPlasim
module: physicsnemo.experimental.models.pangu_plasim

# Variable groups — PanguWeather sim52 channel order.
surface_variables: [pl, tas]
upper_air_variables: [ta, ua, va, hus, zg]
constant_boundary_variables: [lsm, sg, z0]
varying_boundary_variables: [sst, rsdt, sic]
diagnostic_variables: [pr_6h]
land_variables: []
ocean_variables: []

# Grid / level geometry — PLASIM T42 at 13 pressure levels (PANGU_PLASIM_H5_DERECHO_0514).
levels: [5000, 10000, 15000, 20000, 25000, 30000, 40000, 50000, 60000, 70000, 85000, 92500, 100000]
horizontal_resolution: [64, 128]
patch_size: [2, 2, 2]
window_size: [2, 2, 4]

# Backbone capacity.
depths: [2, 6, 6, 2]
num_heads: [6, 12, 12, 6]
embed_dim: 192
updown_scale_factor: 2

# Heads + behaviour switches.
predict_delta: False
mask_output: False
upper_air_boundary: False
vertical_windowing: False
subpixel_deconv: True
polar_pad: False
grid_has_poles: False
recovery_head: True
diagnostic_head: False
has_diagnostic: True

# Regularization / activation checkpointing.
drop_rate: 0.0
checkpointing: 2
use_reentrant: False
